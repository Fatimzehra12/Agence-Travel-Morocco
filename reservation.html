<body>
    <h2>Formulaire</h2>
    <hr>
    <br>
    <p>Pour réserver votre place, veuillez remplire ce formulaire.</p>
    <br>
   <form>
     <label >Nom :</label>
     <input type="text">
     <br>
     <br>
     <label>Prénom :</label>
     <input type="text">
     <br>
     <br>
     <label>Email :</label>
     <input type="email">
     <br>
     <br>
     <label>Téléphone :</label>
     <input type="number">
     <br>
     <br>
     <label>Date de naissance :</label>
     <input type="date">

     <br>
     <label>Destination :</label>

     <br>
     <br>
     <label>Date de voyage : </label>
     <input type="date">

     <br>

     <input type="number">
     <br>
     <br>
     <label>Hébergement :</label>
     <select name="héb" id="Hébergement">
      <option value="">Choisissez un hébergement</option>
      <option value="hotel">Hôtel</option>
      <option value="riad">Riad</option>
      <option value="camp">Camping</option>
     </select>
     <br>
     <br>
     <label>Transport :</label>

     <br>

     <input type="checkbox" id="assurance" name="assurance">

<input type="checkbox" id="photographe" name="photographe">
<label for="natation">Photographe professionnel</label><br>
     <br>
     <br>

     <br>
     <br>

     <br>
